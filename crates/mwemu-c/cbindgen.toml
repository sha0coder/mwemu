language = "C"
include_guard = "MWEMU_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen from crates/mwemu-c. Do not edit by hand. */"
documentation = true
documentation_style = "c99"
cpp_compat = true
tab_width = 4

[parse]
# libmwemu is not parsed: its `Emu` type stays opaque behind `MwemuEmu*`.
parse_deps = false

[export]
prefix = ""

[enum]
prefix_with_name = true
