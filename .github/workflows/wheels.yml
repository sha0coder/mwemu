# Build pymwemu wheels for Linux, macOS and Windows and publish to PyPI.
#
# Triggers:
#   - push a tag  -> build all wheels + sdist AND publish to PyPI
#   - manual run  -> build all wheels + sdist (no publish), as a smoke test
#
# pymwemu lives in crates/pymwemu, so every maturin step runs with
# `working-directory: crates/pymwemu` and uploads `crates/pymwemu/dist`.
#
# No abi3 (pyo3-stub-gen needs the full API), so wheels are per-Python-version:
# Linux uses the manylinux image's interpreters (--find-interpreter), while
# macOS/Windows build one wheel per Python in the matrix.
name: wheels

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/pymwemu
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist --find-interpreter
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/pymwemu/dist

  macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/pymwemu
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.python-version }}
          path: crates/pymwemu/dist

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/pymwemu
          target: x64
          args: --release --out dist --interpreter python
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: crates/pymwemu/dist

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/pymwemu
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/pymwemu/dist

  release:
    name: Publish to PyPI
    runs-on: ubuntu-22.04
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [linux, macos, windows, sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
