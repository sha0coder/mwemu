name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Add x86_64 target (macOS ARM)
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin

      # This repo is just the mwemu CLI; it depends on the published libmwemu
      # crate. The full emulator test suite lives in github.com/mwemuorg/libmwemu.
      - name: Build
        run: cargo build --verbose

      - name: Clippy
        run: cargo clippy

      - name: Test
        run: cargo test --verbose
